<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Backup Status</title>
<style>
.status-ok { color: #00c853; font-weight: bold; }
.status-warn { color: #ffc107; font-weight: bold; }
.status-error { color: #f44336; font-weight: bold; }
</style>
</head>
<body>

<h2>Backup Diário</h2>

<p>Último Backup: <span id="lastBackup">-</span></p>
<p>Estado: <span id="status" class="status-warn">A aguardar</span></p>
<p>Tempo até próximo: <span id="timer">-</span></p>

<script>
function updateTimer(){
  const now = new Date();
  const target = new Date();
  target.setHours(19,30,0,0);

  if(now > target) target.setDate(target.getDate()+1);

  const diff = target - now;
  const h = Math.floor(diff/1000/60/60);
  const m = Math.floor((diff/1000/60)%60);

  document.getElementById("timer").innerText = h+"h "+m+"m";
}

setInterval(updateTimer,1000);
updateTimer();

function setStatus(ok){
  const el = document.getElementById("status");
  if(ok){
    el.innerText = "Backup feito";
    el.className = "status-ok";
  } else {
    el.innerText = "Por fazer";
    el.className = "status-error";
  }
}

// simulate check
setTimeout(()=>{
  setStatus(true);
  document.getElementById("lastBackup").innerText = new Date().toLocaleString();
},3000);

</script>

</body>
</html>
