<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App Gestão</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0b1220;
  color:white;
}

/* LOGIN */
#loginScreen{
  display:flex;
  height:100vh;
  justify-content:center;
  align-items:center;
}

.card{
  background:#111827;
  padding:30px;
  border-radius:16px;
  width:320px;
}

/* WIDGET */
.online-compact-widget{
  position:fixed;
  top:18px;
  right:18px;
  z-index:9999;
  width:280px;
  border-radius:20px;
  padding:12px;
  background:rgba(0,0,0,0.8);
  backdrop-filter:blur(12px);
  display:none;
}

.online-compact-head{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}

.online-compact-row{
  display:flex;
  justify-content:space-between;
  margin-top:5px;
}
</style>
</head>

<body>

<div id="onlineUsersCompact" class="online-compact-widget"></div>

<div id="loginScreen">
  <div class="card">
    <h2>Login</h2>
    <input id="email" placeholder="Email" style="width:100%;margin-bottom:10px;">
    <input id="pass" type="password" placeholder="Password" style="width:100%;margin-bottom:10px;">
    <button onclick="login()">Entrar</button>
  </div>
</div>

<div id="app" style="display:none;padding:20px;">
  <h1>Dashboard</h1>
  <button onclick="logout()">Logout</button>
</div>

<script>
let onlineUsers = [
  {name:"Ricardo",role:"Admin",page:"Dashboard"},
  {name:"Jorge",role:"User",page:"Clientes"}
];

function renderWidget(){
  const el = document.getElementById("onlineUsersCompact");

  if(!document.body.classList.contains("logged-in")){
    el.style.display="none";
    return;
  }

  el.style.display="block";

  el.innerHTML = `
    <div class="online-compact-head">
      <strong>Online</strong>
      <span>${onlineUsers.length}</span>
    </div>
    ${
      onlineUsers.map(u=>`
        <div class="online-compact-row">
          <div>${u.name}</div>
          <div>${u.role}</div>
        </div>
      `).join("")
    }
  `;
}

function login(){
  document.body.classList.add("logged-in");
  document.getElementById("loginScreen").style.display="none";
  document.getElementById("app").style.display="block";
  renderWidget();
}

function logout(){
  document.body.classList.remove("logged-in");
  document.getElementById("loginScreen").style.display="flex";
  document.getElementById("app").style.display="none";
  renderWidget();
}
</script>

</body>
</html>
